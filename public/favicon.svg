<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="Gamebreakers Academy"
>
  <!-- Dark stone background with subtle rounded corners -->
  <rect
    x="4"
    y="4"
    width="56"
    height="56"
    rx="12"
    ry="12"
    fill="#111827"
  />

  <!-- GB monogram in cream, bold collegiate-style -->
  <text
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, serif"
    font-weight="800"
    font-size="26"
    fill="#FDFCF8"
    letter-spacing="1"
  >
    GB
  </text>
</svg>
